<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="home.css">
    <title>NiArc</title>
</head>

<body>


    <aside class="side-menu" id="sideMenu">
        <ul class="menu-links">

            <nav>
                <li><a href="#">Support</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#about-us">About Us</a></li>
                <li><a href="#" class="logout-text">Log out</a></li>
            </nav>


            <li class="menu-theme-toggle">
                <span>Dark Theme</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
            </li>

        </ul>
    </aside>

    <header>

        <div id="burgerMenu" class="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <a href="./home.html" class="logo">NiArc</a>

        <nav class="sign">
            <a href="#">Sign in</a>
            <span>/</span>
            <a href="#">Sign up</a>
        </nav>

    </header>

    <main>

        <section class="choose section">
            <div class="form-design container">
                <article></article>
                <article></article>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container footer-grid">
            <div class="footer-col">
                <div class="footer-logo">NiArc</div>
                <p>Minimalist Design Studio</p>
            </div>
            <div class="footer-col" id="contact">
                <h4>Contact</h4>
                <p>contact@niarc.gmail.com</p>
                <p>+995 555 123 456</p>
            </div>
            <div class="footer-col">
                <h4>Follow Us</h4>
                <ul class="social-list">
                    <li><a href="#" class="fb-hover">Facebook</a></li>
                    <li><a href="#" class="insta-hover">Instagram</a></li>
                    <li><a href="#" class="tt-hover">TikTok</a></li>
                    <li><a href="#" class="li-hover">LinkedIn</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        const burgerMenu = document.getElementById('burgerMenu');
        const sideMenu = document.getElementById('sideMenu');

        if (burgerMenu && sideMenu) {
            burgerMenu.addEventListener('click', () => {
                burgerMenu.classList.toggle('active');
                sideMenu.classList.toggle('active');
            });
        }

        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        if (toggleSwitch) {
            toggleSwitch.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            });
        }
    </script>

</body>

</html>
